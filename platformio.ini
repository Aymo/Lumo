; Lumo - bureau-robotje met expressieve oogjes
; Hardware: Waveshare ESP32-S3-Touch-AMOLED-1.75
;   Display : CO5300 AMOLED 466x466, QSPI
;   Touch   : CST9217          (I2C)
;   IMU     : QMI8658 6-assig  (I2C)
;   Audio   : ES8311 codec + dual mic + speaker (I2S)
;   Power   : AXP2101
;   Memory  : 16MB flash, 8MB Octal PSRAM @ 80MHz

[platformio]
default_envs = lumo
; Korte core_dir nodig op Windows: het ESP32-arduino-libs package bevat
; diep geneste Matter-headers die anders door de 260-char MAX_PATH limiet barsten.
core_dir = D:/p

[env:lumo]
; pioarduino fork: levert Arduino-ESP32 v3.x (de officiele PIO platform zit nog op v2.x).
; Arduino_GFX (CO5300 driver) heeft v3.x nodig vanwege esp32-hal-periman.h.
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

; --- Geheugen ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.f_flash             = 80000000L
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = default_16MB.csv

; --- Native USB CDC (COM5 = USB JTAG/serial debug unit) ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; --- Upload & monitor ---
upload_port    = COM5
upload_speed   = 921600
monitor_port   = COM5
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; --- Libraries ---
lib_deps =
    moononournation/GFX Library for Arduino@^1.6.4
    lewisxhe/SensorLib@^0.3.0
    lewisxhe/XPowersLib@^0.2.6
